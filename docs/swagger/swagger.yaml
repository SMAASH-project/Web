basePath: /api
definitions:
  dtos.CategoryCreateDTO:
    properties:
      name:
        maxLength: 20
        type: string
    required:
    - name
    type: object
  dtos.CategoryReadDTO:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  dtos.CategoryUpdateDTO:
    properties:
      id:
        type: integer
      name:
        maxLength: 20
        type: string
    required:
    - id
    - name
    type: object
  dtos.ErrResp:
    properties:
      error:
        type: string
      path:
        type: string
      timestamp:
        type: string
    type: object
  dtos.LevelCreateDTO:
    properties:
      img_uri:
        type: string
      name:
        maxLength: 20
        type: string
    required:
    - img_uri
    - name
    type: object
  dtos.LevelReadDTO:
    properties:
      id:
        type: integer
      img_uri:
        type: string
      name:
        type: string
    type: object
  dtos.LevelUpdateDTO:
    properties:
      id:
        type: integer
      img_uri:
        type: string
      name:
        maxLength: 20
        type: string
    required:
    - id
    - img_uri
    - name
    type: object
  dtos.PlayerProfileAppendDTO:
    properties:
      display_name:
        maxLength: 20
        type: string
    required:
    - display_name
    type: object
  dtos.PlayerProfileCreateDTO:
    properties:
      display_name:
        maxLength: 20
        type: string
      user_id:
        type: integer
    required:
    - display_name
    - user_id
    type: object
  dtos.PlayerProfileReadDTO:
    properties:
      coins:
        type: integer
      display_name:
        type: string
      id:
        type: integer
      last_login:
        type: string
    type: object
  dtos.PlayerProfileUpdateDTO:
    properties:
      coins:
        type: integer
      display_name:
        maxLength: 20
        type: string
      id:
        type: integer
    required:
    - display_name
    - id
    type: object
  dtos.RoleCreateDTO:
    properties:
      name:
        maxLength: 7
        type: string
    required:
    - name
    type: object
  dtos.RoleReadDTO:
    properties:
      id:
        type: integer
      name:
        type: string
    type: object
  dtos.RoleUpdateDTO:
    properties:
      id:
        type: integer
      name:
        maxLength: 7
        type: string
    required:
    - id
    - name
    type: object
  dtos.TokenRefreshRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  dtos.UserCreateDTO:
    properties:
      email:
        maxLength: 30
        type: string
      password:
        maxLength: 50
        minLength: 8
        type: string
      role_id:
        type: integer
      username:
        maxLength: 20
        minLength: 3
        type: string
    required:
    - email
    - password
    - role_id
    - username
    type: object
  dtos.UserLoginDTO:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dtos.UserReadDTO:
    properties:
      email:
        type: string
      id:
        type: integer
      is_banned:
        type: boolean
      last_login:
        type: string
    type: object
  dtos.UserUpdateDTO:
