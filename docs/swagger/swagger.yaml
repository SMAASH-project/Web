    required:
    - email
    - password
    type: object
  dtos.UserLoginDTO:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  dtos.UserPromoteDTO:
    properties:
      id:
        type: integer
      target_role:
