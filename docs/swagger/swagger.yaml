    required:
    - email
    - id
    type: object
info:
  contact: {}
  description: This site documents the endpoints for the smaash web app, allowing
    easy testing
  license:
    name: MIT
  termsOfService: http://swagger.io/terms/
  title: SMAASH API documentation
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Logs in a user
      parameters:
      - description: dto for logging in a user
        in: body
        name: user_login_dto
        required: true
        schema:
          $ref: '#/definitions/dtos.UserLoginDTO'
      produces:
      - application/json
      responses:
        "200":
          description: returns the id of the logged in user
          schema:
            type: int
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/dtos.ErrResp'
        "404":
          description: record not found
          schema:
            $ref: '#/definitions/dtos.ErrResp'
        "422":
          description: request body in wrong format
          schema:
            $ref: '#/definitions/dtos.ErrResp'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/dtos.ErrResp'
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Logs out a user
      produces:
      - application/json
      responses:
        "204":
          description: doesn't return anything
          schema:
            type: ""
      tags:
      - auth
  /auth/signup:
    post:
      consumes:
      - application/json
      description: Register a new user
      parameters:
      - description: dto for creating a new user
        in: body
        name: user_create_dto
        required: true
        schema:
          $ref: '#/definitions/dtos.UserCreateDTO'
      produces:
      - application/json
      responses:
        "201":
          description: returns newly created user
          schema:
            $ref: '#/definitions/dtos.UserReadDTO'
        "409":
          description: unique key violation
          schema:
            $ref: '#/definitions/dtos.ErrResp'
        "422":
          description: request body in wrong format
          schema:
            $ref: '#/definitions/dtos.ErrResp'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/dtos.ErrResp'
      tags:
      - auth
  /categories:
    get:
      consumes:
      - application/json
      description: Reads categories
      produces:
      - application/json
      responses:
        "200":
          description: returns all categories
          schema:
            items:
              $ref: '#/definitions/dtos.CategoryReadDTO'
            type: array
        "401":
          description: unauthorized
          schema:
            $ref: '#/definitions/dtos.ErrResp'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/dtos.ErrResp'
      tags:
      - categories
    post:
      consumes:
      - application/json
      description: Creates a new category
      parameters:
      - description: dto for creating a new category
        in: body
        name: category_create_dto
        required: true
