        type: string
    required:
    - id
    - name
    type: object
  dtos.CharacterCreateDTO:
    properties:
      category_ids:
        items:
          type: integer
        type: array
      description:
        maxLength: 70
        type: string
      name:
        maxLength: 20
        type: string
      price:
        type: integer
      rarity_id:
        type: integer
    required:
    - description
    - name
    - price
    - rarity_id
    type: object
  dtos.CharacterReadDTO:
    properties:
      categories:
        items:
          type: string
        type: array
      description:
        type: string
      id:
        type: integer
      img_uri:
        type: string
      name:
        type: string
      price:
        type: integer
      rarity:
        type: string
    type: object
  dtos.CharacterUpdateDTO:
    properties:
