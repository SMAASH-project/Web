    - description
    - id
    - name
    - price
    - rarity_id
    type: object
  dtos.ErrResp:
    properties:
      error:
        type: string
      path:
        type: string
      timestamp:
        type: string
    type: object
  dtos.FavouriteCharactersDTO:
    properties:
      categories:
        items:
          type: string
        type: array
      count_of_plays:
        type: integer
      description:
        type: string
      id:
        type: integer
      img_uri:
        type: string
      name:
        type: string
      price:
        type: integer
      rarity:
        type: string
    type: object
  dtos.LevelCreateDTO:
    properties:
      img_uri:
        type: string
      name:
        maxLength: 20
        type: string
    required:
    - img_uri
    - name
    type: object
  dtos.LevelReadDTO:
    properties:
      id:
        type: integer
      img_uri:
        type: string
      name:
        type: string
    type: object
  dtos.LevelUpdateDTO:
    properties:
      id:
        type: integer
      img_uri:
        type: string
      name:
        maxLength: 20
        type: string
    required:
    - id
    - img_uri
    - name
    type: object
  dtos.MatchCreateDTO:
    properties:
      ended_at:
        type: string
      level_id:
        type: integer
      participation:
        $ref: '#/definitions/dtos.MatchCreateParticipationDTO'
      session_id:
        maxLength: 64
        type: string
      started_at:
        type: string
    required:
    - ended_at
    - level_id
    - participation
    - session_id
    - started_at
    type: object
  dtos.MatchCreateParticipationDTO:
    properties:
      character_id:
        type: integer
      coins_awarded:
        minimum: 0
        type: integer
      network_status:
        maxLength: 12
        type: string
      player_id:
        type: integer
      result:
        maxLength: 4
        type: string
    required:
    - character_id
    - coins_awarded
    - network_status
    - player_id
    - result
    type: object
  dtos.MatchReadDTO:
    properties:
      ended_at:
        type: string
      level_id:
        type: integer
      match_id:
        type: integer
      players:
        type: integer
      started_at:
        type: string
    type: object
  dtos.PlayerProfileAppendDTO:
    properties:
