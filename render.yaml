services:
  - type: web
    name: smaash-web
    runtime: go
    region: frankfurt
    plan: free
    autoDeployTrigger: commit
    buildCommand: cd client && npm ci && npm run build && cd .. && go build -o build/main cmd/api/main.go
    startCommand: ./build/main
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DB_URL
        value: test.db
      - key: UPLOAD_DIR
        value: ./uploads/pfps
